<!DOCTYPE html>
<html lang="en">

<head>

    <title>Eatero - Find your true taste!</title>
    {% load static %}
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'say_hello' %}" class="brand">

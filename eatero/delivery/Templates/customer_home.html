<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants - Eatero</title>
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'say_hello' %}" class="brand">
                <div class="logo">E</div>
                <span>Eatero</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'show_cart' username %}" class="btn btn-outline">
                    Cart
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="hero" style="padding: 2rem; margin-bottom: 2rem;">
            <h2>Welcome back, {{username}}!</h2>
            <p>Hungry? Discover the best flavors around you.</p>
        </header>

        <div class="grid">
            {% for r in restaurantList %}
            <article class="card">
                <img src="{{ r.picture }}" alt="{{ r.name }}" class="card-img">
                <div class="card-body">
                    <h3 class="card-title">{{ r.name }}</h3>
                    <p class="card-text">{{ r.cuisine }}</p>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span class="badge badge-warning">★ {{ r.rating }}</span>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{% url 'view_menu' r.id username %}" class="btn btn-primary btn-block">View Menu</a>
                </div>
            </article>
            {% empty %}
            <div class="hero">
                <p>No restaurants found. Check back later!</p>
            </div>
            {% endfor %}
        </div>
    </main>
</body>

</html>

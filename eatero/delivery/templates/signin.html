<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Eatero</title>
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'say_hello' %}" class="brand">
                <div class="logo">E</div>
                <span>Eatero</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'open_signup' %}">Don't have an account? Sign up</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="form-card">
            <h3 class="text-center mb-2">Welcome Back!</h3>
            
            {% if success %}
            <div class="badge badge-success mb-2" style="display: block; padding: 0.75rem; text-align: center;">
                {{ success }}
            </div>
            {% endif %}

            <form action="{% url 'signin' %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" class="form-control"
                        placeholder="Enter your username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control"
                        placeholder="Enter your password" required />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
        </div>
    </main>
</body>

</html>
